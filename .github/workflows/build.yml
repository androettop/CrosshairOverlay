name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    env:
      APP_NAME: CrosshairOverlay
      APP_DISPLAY_NAME: Crosshair Overlay
      APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: CrosshairOverlay-win-x64
            artifact_path: ./artifacts/win-x64/CrosshairOverlay-win-x64-setup.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact: CrosshairOverlay-linux-x64
            artifact_path: ./artifacts/linux-x64/CrosshairOverlay-linux-x64.tar.gz
          - os: macos-latest
            rid: osx-x64
            artifact: CrosshairOverlay-osx-x64
            artifact_path: ./artifacts/osx-x64/CrosshairOverlay-osx-x64.dmg
          - os: macos-latest
            rid: osx-arm64
            artifact: CrosshairOverlay-osx-arm64
            artifact_path: ./artifacts/osx-arm64/CrosshairOverlay-osx-arm64.dmg

    permissions:
      contents: write

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Resolve version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' CrosshairOverlay.csproj)
          fi
          echo "APP_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Publish
        run: dotnet publish ./CrosshairOverlay.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish/${{ matrix.rid }}

      - name: Package Linux tarball
        if: matrix.rid == 'linux-x64'
        shell: bash
        run: bash ./.github/scripts/package-linux.sh "${{ matrix.rid }}"

      - name: Package Windows installer (EXE)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: >-
          ./.github/scripts/package-windows-installer.ps1
          -Rid "${{ matrix.rid }}"

      - name: Package macOS app bundle
        if: startsWith(matrix.rid, 'osx-')
        shell: bash
        run: bash ./.github/scripts/package-macos.sh "${{ matrix.rid }}"

      - name: Import Apple signing certificate
        if: startsWith(matrix.rid, 'osx-') && env.APPLE_CERT_BASE64 != '' && env.APPLE_SIGNING_IDENTITY != ''
        shell: bash
        run: bash ./.github/scripts/macos-import-cert.sh

      - name: Sign macOS app and dmg (Developer ID)
        if: startsWith(matrix.rid, 'osx-') && env.APPLE_CERT_BASE64 != '' && env.APPLE_SIGNING_IDENTITY != ''
        shell: bash
        run: bash ./.github/scripts/macos-sign.sh "${{ matrix.rid }}"

      - name: Notarize and staple dmg
        if: startsWith(matrix.rid, 'osx-') && env.APPLE_CERT_BASE64 != '' && env.APPLE_SIGNING_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        shell: bash
        run: bash ./.github/scripts/macos-notarize.sh "${{ matrix.rid }}"

      - name: Cleanup macOS signing keychain
        if: startsWith(matrix.rid, 'osx-') && always()
        shell: bash
        run: bash ./.github/scripts/macos-cleanup.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.artifact_path }}" --clobber
