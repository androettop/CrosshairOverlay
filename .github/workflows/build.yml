name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    env:
      APP_NAME: CrosshairOverlay
      APP_DISPLAY_NAME: Crosshair Overlay
      APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: CrosshairOverlay-win-x64
            artifact_path: ./publish/win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: CrosshairOverlay-linux-x64
            artifact_path: ./publish/linux-x64
          - os: macos-latest
            rid: osx-x64
            artifact: CrosshairOverlay-osx-x64
            artifact_path: ./artifacts/osx-x64/CrosshairOverlay-osx-x64.dmg
          - os: macos-latest
            rid: osx-arm64
            artifact: CrosshairOverlay-osx-arm64
            artifact_path: ./artifacts/osx-arm64/CrosshairOverlay-osx-arm64.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish ./CrosshairOverlay.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish/${{ matrix.rid }}

      - name: Package macOS app bundle
        if: startsWith(matrix.rid, 'osx-')
        shell: bash
        run: |
          set -euo pipefail

          publish_dir="./publish/${{ matrix.rid }}"
          artifact_dir="./artifacts/${{ matrix.rid }}"
          app_dir="${artifact_dir}/${APP_NAME}.app"
          contents_dir="${app_dir}/Contents"
          macos_dir="${contents_dir}/MacOS"
          resources_dir="${contents_dir}/Resources"
          dmg_stage_dir="${artifact_dir}/dmg"
          dmg_path="${artifact_dir}/${APP_NAME}-${{ matrix.rid }}.dmg"
          icon_source="./assets/icon-source.png"

          rm -rf "${artifact_dir}"
          mkdir -p "${macos_dir}" "${resources_dir}" "${dmg_stage_dir}"

          ditto "${publish_dir}" "${macos_dir}"
          chmod +x "${macos_dir}/${APP_NAME}"

          # Build a valid macOS icns icon from the shared PNG source.
          iconset_dir="${artifact_dir}/AppIcon.iconset"
          rm -rf "${iconset_dir}"
          mkdir -p "${iconset_dir}"

          sips -z 16 16     "${icon_source}" --out "${iconset_dir}/icon_16x16.png" >/dev/null
          sips -z 32 32     "${icon_source}" --out "${iconset_dir}/icon_16x16@2x.png" >/dev/null
          sips -z 32 32     "${icon_source}" --out "${iconset_dir}/icon_32x32.png" >/dev/null
          sips -z 64 64     "${icon_source}" --out "${iconset_dir}/icon_32x32@2x.png" >/dev/null
          sips -z 128 128   "${icon_source}" --out "${iconset_dir}/icon_128x128.png" >/dev/null
          sips -z 256 256   "${icon_source}" --out "${iconset_dir}/icon_128x128@2x.png" >/dev/null
          sips -z 256 256   "${icon_source}" --out "${iconset_dir}/icon_256x256.png" >/dev/null
          sips -z 512 512   "${icon_source}" --out "${iconset_dir}/icon_256x256@2x.png" >/dev/null
          sips -z 512 512   "${icon_source}" --out "${iconset_dir}/icon_512x512.png" >/dev/null
          sips -z 1024 1024 "${icon_source}" --out "${iconset_dir}/icon_512x512@2x.png" >/dev/null

          iconutil -c icns "${iconset_dir}" -o "${resources_dir}/AppIcon.icns"

          cat > "${contents_dir}/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>${APP_DISPLAY_NAME}</string>
            <key>CFBundleExecutable</key>
            <string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>com.crosshairoverlay.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleIconName</key>
            <string>AppIcon</string>
            <key>CFBundleName</key>
            <string>${APP_DISPLAY_NAME}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.run_number }}</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          # Ad-hoc sign so Gatekeeper does not flag as trivially damaged.
          codesign --force --deep --sign - "${app_dir}"
          codesign --verify --deep --strict --verbose=2 "${app_dir}"

          ditto "${app_dir}" "${dmg_stage_dir}/${APP_NAME}.app"
          ln -s /Applications "${dmg_stage_dir}/Applications"

          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder "${dmg_stage_dir}" \
            -ov \
            -format UDZO \
            "${dmg_path}"

          # Also ad-hoc sign the dmg for consistency.
          codesign --force --sign - "${dmg_path}"

      - name: Import Apple signing certificate
        if: startsWith(matrix.rid, 'osx-') && env.APPLE_CERT_BASE64 != '' && env.APPLE_SIGNING_IDENTITY != ''
        shell: bash
        run: |
          set -euo pipefail

          echo "${APPLE_CERT_BASE64}" | base64 --decode > apple_cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import apple_cert.p12 -k build.keychain -P "${APPLE_CERT_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Sign macOS app and dmg (Developer ID)
        if: startsWith(matrix.rid, 'osx-') && env.APPLE_CERT_BASE64 != '' && env.APPLE_SIGNING_IDENTITY != ''
        shell: bash
        run: |
          set -euo pipefail

          app_dir="./artifacts/${{ matrix.rid }}/${APP_NAME}.app"
          dmg_path="./artifacts/${{ matrix.rid }}/${APP_NAME}-${{ matrix.rid }}.dmg"

          codesign --force --deep --options runtime --timestamp --sign "${APPLE_SIGNING_IDENTITY}" "${app_dir}"
          codesign --verify --deep --strict --verbose=2 "${app_dir}"

          codesign --force --timestamp --sign "${APPLE_SIGNING_IDENTITY}" "${dmg_path}"
          codesign --verify --verbose=2 "${dmg_path}"

      - name: Notarize and staple dmg
        if: startsWith(matrix.rid, 'osx-') && env.APPLE_CERT_BASE64 != '' && env.APPLE_SIGNING_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        shell: bash
        run: |
          set -euo pipefail

          dmg_path="./artifacts/${{ matrix.rid }}/${APP_NAME}-${{ matrix.rid }}.dmg"
          app_dir="./artifacts/${{ matrix.rid }}/${APP_NAME}.app"

          xcrun notarytool submit "${dmg_path}" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait

          xcrun stapler staple "${app_dir}"
          xcrun stapler staple "${dmg_path}"

      - name: Cleanup macOS signing keychain
        if: startsWith(matrix.rid, 'osx-') && always()
        shell: bash
        run: |
          security delete-keychain build.keychain || true
          rm -f apple_cert.p12

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
